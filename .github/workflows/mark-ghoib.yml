name: Mark Ghoib Cron

on:
  schedule:
    # Jalankan setiap jam di menit ke-5 (00:05, 01:05, 02:05, dst.)
    - cron: '5 * * * *'
  workflow_dispatch: # Tombol manual trigger di GitHub

jobs:
  mark-ghoib:
    runs-on: ubuntu-latest
    steps:
      - name: Panggil API Mark Ghoib
        run: |
          echo "Memanggil API mark-ghoib..."
          echo "Waktu saat ini (UTC): $(date -u)"
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            "${{ secrets.APP_URL }}/api/cron/mark-ghoib" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 30)
          echo "Response dari API:"
          echo "$RESPONSE"
